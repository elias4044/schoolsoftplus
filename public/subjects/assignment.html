<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Subject | Schoolsoft+</title>

    <!-- Favicon -->
    <link rel="icon" href="../img/favicon-32x32.png" type="image/x-icon">
    <link rel="shortcut icon" href="../img/favicon-32x32.png" type="image/x-icon">

    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/assignment.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link rel="stylesheet" href="../css/settings.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back,check_circle,description,grid_view,integration_instructions,rule" />

</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; flex-direction: column;">
                    <h1>Schoolsoft+</h1>
                    <h5 class="version">Version loading...</h5>
                    <script>
                        fetch("/api/version")
                            .then(response => response.text())
                            .then(data => {
                                document.querySelector(".version").textContent = data;
                            })
                            .catch(error => {
                                console.error("Error fetching version:", error);
                            });
                    </script>
                    <p>Developed by Elias</p>
                </div>
            </div>

            <div class="sidebar-content">
                <!-- Navigation Groups -->
                <div class="nav-group">
                    <h3 class="nav-group-title">Main</h3>
                    <ul class="nav-items">
                        <li class="nav-item"><span
                                class="material-symbols-rounded">arrow_back</span>
                            <p><a href="/main.html"
                                    style="text-decoration: none; color: var(--text-color);">Dashboard</a></p>
                        </li>
                         <li class="nav-item"><span
                                class="material-symbols-rounded">arrow_back</span>
                            <p><a href="/subjects.html"
                                    style="text-decoration: none; color: var(--text-color);">Subjects</a></p>
                        </li>
                    </ul>
                </div>
            </div>
            <footer>
                <a href="/terms-of-service.html">Terms of Service</a>
                <p>© 2025 Schoolsoft+. All rights reserved.</p>
            </footer>
            <style>
                aside.sidebar {
                    display: flex;
                    flex-direction: column;
                }


                footer {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    text-align: center;
                    padding: 10px;
                    position: relative;
                }


                footer a {
                    color: var(--primary-color);
                    text-decoration: none;
                    margin-bottom: 5px;
                    font-size: 14px;
                }

                footer p {
                    font-size: 12px;
                    color: #666;
                }

                @media (min-width: 768px) {
                    aside.sidebar {
                        display: flex;
                        flex-direction: column;
                        /* make sidebar take full height */
                        position: relative;
                        /* so footer positioning is relative to sidebar */
                    }

                    .sidebar-content {
                        flex: 1;
                        /* take up all remaining space below header */
                    }

                    footer {
                        margin-top: auto;
                        /* pushes footer down */
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        text-align: center;
                        padding: 10px;
                        position: relative;
                        /* remove absolute positioning */
                        left: 0;
                        /* reset your old offset */
                        bottom: 0;
                    }


                    footer a {
                        color: var(--primary-color);
                        text-decoration: none;
                        margin-bottom: 5px;
                        font-size: 14px;
                    }

                    footer p {
                        font-size: 12px;
                        color: #666;
                    }

                }
            </style>
        </aside>

        <div class="main-content">
            <div class="content-header">
                <div class="content-header">
                    <h2><span class="back-link"><- |</span> Assignment Name</h2>
                </div>
            </div>

            <!-- Subject Content -->
            <div class="full-width content">
                <div class="loader-container">
                    <div class="loader-spinner"></div>
                    <div class="loader-text">Loading scripts...</div>
                </div>
            </div>
        </div>

        <script src="../js/dark-mode.js"></script>
        <script src="../js/assignment.js"></script>
        <script src="../js/global.js"></script>

</body>

</html>
