<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Schoolsoft+</title>
    
    <!-- Favicon & Theme -->
    <link rel="icon" href="../img/favicon-32x32.png" type="image/png" />
    <meta name="theme-color" content="#2a2a2a" />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/dark-mode.css" />
    <link rel="stylesheet" href="../css/admin/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--background-color, #0f0f0f);
            color: var(--text-color, #e0e0e0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Simple subtle background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                circle at 50% 50%, 
                rgba(var(--primary-color-rgb, 76, 175, 80), 0.05) 0%, 
                transparent 70%
            );
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            background: var(--card-background, #1a1a1a);
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .icon-wrapper {
            width: 56px;
            height: 56px;
            margin: 0 auto 24px;
            background: var(--primary-color, #4caf50);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 12px;
            color: var(--text-color, #ffffff);
            line-height: 1.3;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary, #999);
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .login-button {
            display: block;
            width: 100%;
            padding: 14px 24px;
            background: var(--primary-color, #4caf50);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-button:hover {
            background: var(--primary-color);
            transform: translateY(-1px);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button a {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-button svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .info-box {
            margin-top: 24px;
            padding: 16px;
            background: rgba(76, 175, 80, 0.05);
            border-left: 3px solid var(--primary-color, #4caf50);
            border-radius: 8px;
        }

        .info-box p {
            font-size: 14px;
            color: var(--text-secondary, #ccc);
            line-height: 1.6;
        }

        .info-box strong {
            color: var(--primary-color, #4caf50);
        }

        /* Responsive */
        @media (max-width: 540px) {
            .container {
                padding: 36px 28px;
            }

            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        
        <h1>Admin Access Required</h1>
        <p class="subtitle">This area is restricted to administrators only. Please authenticate with your admin credentials to continue.</p>
        
        <button class="login-button">
            <a href="/login?redirect=/admin">
                <svg viewBox="0 0 24 24">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                Sign In as Admin
            </a>
        </button>
        
        <div class="info-box">
            <p><strong>Note:</strong> Valid administrator credentials are required to access this dashboard. If you believe you should have access, please contact your system administrator.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/dark-mode.js"></script>
</body>
</html>
